    <text x="290" y="538" font-family="Inter" font-size="18" fill="#8C949F" text-anchor="middle">Say the word - jump</text>
    <text x="290" y="560" font-family="Inter" font-size="18" fill="#8C949F" text-anchor="middle">to the platform!</text>
