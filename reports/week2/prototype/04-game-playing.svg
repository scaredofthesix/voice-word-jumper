<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <rect width="1280" height="800" fill="#CCEBFF"/>
  <text x="24" y="780" font-family="Inter" font-size="14" fill="#1B2A4A">04 · Game - playing (US-03, US-04)</text>
  <ellipse cx="200" cy="150" rx="70" ry="30" fill="#FFFFFF"/>
  <ellipse cx="1080" cy="120" rx="85" ry="36" fill="#FFFFFF"/>
  <rect y="700" width="1280" height="100" fill="#27AE60"/>
  <g id="hud">
    <rect x="40" y="32" width="140" height="52" rx="26" fill="#FFFFFF"/>
    <text x="110" y="66" font-family="Inter" font-size="24" font-weight="700" fill="#1B2A4A" text-anchor="middle">⭐ 0</text>
    <rect x="200" y="32" width="210" height="52" rx="26" fill="#FFFFFF"/>
    <text x="305" y="65" font-family="Inter" font-size="22" fill="#1F5AB3" text-anchor="middle">Space words</text>
    <g id="pill-listening">
      <rect x="1010" y="32" width="230" height="52" rx="26" fill="#27AE60"/>
      <text x="1125" y="65" font-family="Inter" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">🎤 Listening...</text>
    </g>
  </g>
  <g id="target-word">
    <rect x="440" y="120" width="400" height="130" rx="28" fill="#FFFFFF" stroke="#FFB100" stroke-width="4"/>
    <text x="640" y="165" font-family="Inter" font-size="20" fill="#8C949F" text-anchor="middle">Say the word:</text>
    <text x="640" y="225" font-family="Inter" font-size="56" font-weight="700" fill="#1B2A4A" text-anchor="middle">ROCKET 🚀</text>
  </g>
  <g id="platform-star">
    <rect x="120" y="560" width="280" height="44" rx="22" fill="#1E8A4C"/>
    <text x="260" y="590" font-family="Inter" font-size="30" font-weight="700" fill="#FFFFFF" text-anchor="middle">STAR</text>
  </g>
  <g id="platform-rocket">
    <rect x="500" y="560" width="280" height="44" rx="22" fill="#1E8A4C"/>
    <text x="640" y="590" font-family="Inter" font-size="30" font-weight="700" fill="#FFFFFF" text-anchor="middle">ROCKET</text>
  </g>
  <g id="platform-moon">
    <rect x="880" y="560" width="280" height="44" rx="22" fill="#1E8A4C"/>
    <text x="1020" y="590" font-family="Inter" font-size="30" font-weight="700" fill="#FFFFFF" text-anchor="middle">MOON</text>
  </g>
  <g id="mascot">
    <circle cx="260" cy="505" r="55" fill="#FFB100"/>
    <ellipse cx="240" cy="494" rx="8" ry="11" fill="#1B2A4A"/>
    <ellipse cx="280" cy="494" rx="8" ry="11" fill="#1B2A4A"/>
    <rect x="240" y="521" width="40" height="14" rx="7" fill="#1B2A4A"/>
  </g>
  <text x="640" y="672" font-family="Inter" font-size="22" font-weight="600" fill="#1F5AB3" text-anchor="middle">Say the word on a platform to jump there!</text>
</svg>
